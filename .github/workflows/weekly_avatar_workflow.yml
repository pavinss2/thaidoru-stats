name: Daily Idol Avatar Monitor

on:
  schedule:
    - cron: '30 18 * * *' # Every day at 01:30 Bangkok time (18:30 UTC)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape_avatars:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4

    - name: Run Avatar Monitor
      run: |
        python3 x_image_scraper.py --update-config

    - name: Commit and Push avatar updates
      run: |
        git config --global user.name "Github Actions Scraper Bot"
        git config --global user.email "actions@github.com"
        git add idols.json
        git commit -m "Auto-update avatar configurations: $(date +'%Y-%m-%d')" || exit 0
        for i in {1..5}; do
          git pull --rebase && git push && break || sleep 5
        done
