name: Daily Idol Follower Scraper & Avatar Monitor

on:
  schedule:
    - cron: '2 18 * * *' # Every day at midnight Bangkok time (17:00 UTC)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape_instagram:
    runs-on: ubuntu-latest
    timeout-minutes: 16
    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests beautifulsoup4 psycopg2-binary
    - name: Run Instagram Scraper
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: python3 follower_scraper.py --run --platform instagram

  scrape_x:
    runs-on: ubuntu-latest
    timeout-minutes: 16
    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests beautifulsoup4 psycopg2-binary
    - name: Run X Scraper
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: python3 follower_scraper.py --run --platform x
    - name: Commit and Push idols config updates (if avatar URL changed)
      if: success() || failure()
      run: |
        git config --global user.name "Github Actions Scraper Bot"
        git config --global user.email "actions@github.com"
        git add idols.json || true
        git commit -m "Auto-update X avatars: $(date +'%Y-%m-%d')" || exit 0
        for i in {1..5}; do
          git pull --rebase && git push && break || sleep 5
        done

  scrape_facebook:
    runs-on: ubuntu-latest
    timeout-minutes: 16
    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests beautifulsoup4 psycopg2-binary
    - name: Run Facebook Scraper
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: python3 follower_scraper.py --run --platform facebook

  scrape_tiktok:
    runs-on: ubuntu-latest
    timeout-minutes: 16
    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 playwright psycopg2-binary
        playwright install --with-deps chromium
    - name: Run TikTok Scraper
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: python3 follower_scraper.py --run --platform tiktok

  finalize_data:
    needs: [scrape_instagram, scrape_x, scrape_facebook, scrape_tiktok]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install requests beautifulsoup4 psycopg2-binary
    - name: Run Final Alert
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: python3 follower_scraper.py --send-alert final
