name: Daily Idol Follower Scraper & Avatar Monitor

on:
  schedule:
    - cron: '0 17 * * *' # Every day at midnight Bangkok time (17:00 UTC)
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 playwright psycopg2-binary
        playwright install --with-deps chromium

    - name: Run Daily Scraper Orchestrator
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        python3 daily_workflow.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Github Actions Scraper Bot"
        git config --global user.email "actions@github.com"
        git add idols.json follower_history.csv
        git add failed_scrapes.json || true
        git commit -m "Auto-update follower metrics & profile configurations: $(date +'%Y-%m-%d')" || exit 0
        git push

  retry_failed_scrape:
    needs: scrape_and_deploy
    runs-on: ubuntu-latest
    if: always() && needs.scrape_and_deploy.result == 'success'

    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check if there are failed channels to retry
      id: check_failed
      run: |
        if [ -f failed_scrapes.json ]; then
          echo "found=true" >> $GITHUB_OUTPUT
        else
          echo "found=false" >> $GITHUB_OUTPUT
        fi

    - name: Wait for 30 minutes before retry
      if: steps.check_failed.outputs.found == 'true'
      run: |
        echo "Waiting 30 minutes before retrying failed channels..."
        sleep 1800

    - name: Set up Python
      if: steps.check_failed.outputs.found == 'true'
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      if: steps.check_failed.outputs.found == 'true'
      run: |
        pip install requests beautifulsoup4 playwright psycopg2-binary
        playwright install --with-deps chromium

    - name: Run Scraper Retry on Failed Channels
      if: steps.check_failed.outputs.found == 'true'
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        python3 follower_scraper.py --run --failed-file failed_scrapes.json

    - name: Commit and Push final changes
      if: steps.check_failed.outputs.found == 'true'
      run: |
        git config --global user.name "Github Actions Scraper Bot"
        git config --global user.email "actions@github.com"
        git add idols.json follower_history.csv
        rm -f failed_scrapes.json
        git add failed_scrapes.json || true
        git commit -m "Auto-retry failed follower metrics: $(date +'%Y-%m-%d')" || exit 0
        git push
