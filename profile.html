<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Profile Detail - THAIDORU STATS</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239D4DFF%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%2223 6 13.5 15.5 8.5 10.5 1 18%22></polyline><polyline points=%2217 6 23 6 23 12%22></polyline></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@0.300.0"></script>
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="index.css">
    
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <!-- Vercel Speed Insights -->
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
    <!-- Glow Backdrops -->
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <a href="index.html" class="home-btn">
                    <i data-lucide="arrow-left"></i> Dashboard
                </a>
                <div style="margin-left: 10px;">
                    <h1 id="header-member-title">MEMBER PROFILE</h1>
                    <p class="subtitle" style="margin: 0;" id="header-member-subtitle">Social Growth History</p>
                </div>
            </div>
            
            <!-- Global Autocomplete Searchbar -->
            <div class="global-search-container">
                <div class="search-input-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input type="text" id="global-search-input" placeholder="Search members or groups..." autocomplete="off">
                </div>
                <div class="search-suggestions-box" id="search-suggestions"></div>
            </div>
        </header>

        <!-- Profile Workspace Layout Grid -->
        <div class="profile-layout">
            
            <!-- Sidebar: Member Hero Card -->
            <aside class="profile-sidebar" id="profile-card">
                <div class="profile-avatar-large" id="profile-avatar">-</div>
                
                <div class="profile-title-row">
                    <h2 class="profile-name" id="profile-name">
                        Loading...
                    </h2>
                </div>
                
                <div class="profile-badge-row" id="profile-badges">
                    <!-- Dynamic Badges -->
                </div>
                
                <!-- Metadata items -->
                <div class="profile-meta-grid">
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Group:</span>
                        <span class="profile-meta-value" id="profile-group-val">-</span>
                    </div>
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Agency:</span>
                        <span class="profile-meta-value" id="profile-agency-val">-</span>
                    </div>
                    <div class="profile-meta-item">
                        <span class="profile-meta-label">Represent Color:</span>
                        <span class="profile-meta-value" id="profile-color-val">-</span>
                    </div>
                </div>
                
                <!-- Platform metric links -->
                <div class="profile-platforms-vertical" id="profile-links-list">
                    <!-- Succeeded platforms list -->
                </div>
            </aside>

            <!-- Chart Work Area -->
            <main class="main-content" style="padding: 0;">
                <section class="chart-panel">
                    <div class="chart-header">
                        <div>
                            <h2 id="chart-title"><i data-lucide="trending-up"></i> Follower Trends (All Platforms)</h2>
                            <span class="chart-subtitle" id="chart-sub">Trace growth metrics across historical dates</span>
                        </div>
                        
                        <!-- Chart Controls -->
                        <div class="date-filters">
                            <!-- Chart Type Toggle -->
                            <div class="toggle-group" id="chart-type-toggle">
                                <button class="toggle-btn" data-type="bar" title="Latest Standings Bar">
                                    <i data-lucide="bar-chart-3"></i> Standings
                                </button>
                                <button class="toggle-btn active" data-type="line" title="Growth Trend Line">
                                    <i data-lucide="trending-up"></i> Trend
                                </button>
                            </div>
                            
                            <!-- Platform Icon Buttons -->
                            <div class="platform-icons-row" id="platform-filter-row">
                                <button class="platform-icon-btn active" data-platform="all" title="All Platforms" style="font-size: 11px; font-weight: 800; font-family: var(--font-primary);">ALL</button>
                                <button class="platform-icon-btn" data-platform="instagram" title="Instagram">
                                    <svg viewBox="0 0 448 512"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
                                </button>
                                <button class="platform-icon-btn" data-platform="x" title="X (Twitter)">
                                    <svg viewBox="0 0 512 512"><path d="M389.2 48h70.6L305.6 224.2 487 464H345L233.7 318.6 106.5 464H35.8L200.7 275.5 26.8 48H172.4L272.9 180.9 389.2 48zM364.4 421.8h39.1L151.1 88h-42L364.4 421.8z"/></svg>
                                </button>
                                <button class="platform-icon-btn" data-platform="facebook" title="Facebook">
                                    <svg viewBox="0 0 512 512"><path d="M504 256C504 119 393 8 256 8S8 119 8 256c0 123.78 90.69 226.38 209.25 245V327.69h-63V256h63v-54.64c0-62.15 37-96.48 93.67-96.48 27.14 0 55.52 4.84 55.52 4.84v61h-31.28c-30.8 0-40.41 19.12-40.41 38.73V256h68.78l-11 71.69h-57.78V501C413.31 482.38 504 379.78 504 256z"/></svg>
                                </button>
                                <button class="platform-icon-btn" data-platform="tiktok" title="TikTok">
                                    <svg viewBox="0 0 448 512"><path d="M448 209.91a210.06 210.06 0 0 1-122.77-39.25v178.72A162.55 162.55 0 1 1 185 188.31v89.89a72.69 72.69 0 1 0 72.23 72.42V0h90.87a208.87 208.87 0 0 0 41 93.9 208.56 208.56 0 0 0 58.9 51.6z"/></svg>
                                </button>
                            </div>
                            
                            <div class="date-select-wrapper" id="start-date-wrapper">
                                <label for="start-date-select">From:</label>
                                <select id="start-date-select"></select>
                            </div>
                            <div class="date-select-wrapper" id="end-date-wrapper">
                                <label for="end-date-select">To:</label>
                                <select id="end-date-select"></select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chart-wrapper">
                        <canvas id="growthChart"></canvas>
                    </div>
                </section>
            </main>
            
        </div>
    </div>

    <!-- Script Entrypoint -->
    <script src="profile.js"></script>
    <script>
        // Init icon scripts
        if (window.lucide) {
            window.lucide.createIcons();
        }
    </script>
</body>
</html>
